<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" id="heroine-svg">
  <defs>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a3b52" />
      <stop offset="50%" stop-color="#2d2238" />
      <stop offset="100%" stop-color="#1a1221" />
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff0e6" />
      <stop offset="100%" stop-color="#ffe0d1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="dressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbcfe8" />
      <stop offset="100%" stop-color="#c4b5fd" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 光晕背景 -->
  <ellipse cx="200" cy="260" rx="160" ry="190" fill="rgba(255,255,255,0.08)" filter="url(#glow)" />

  <!-- 后发 -->
  <path d="M80,180 Q60,300 70,420 Q100,460 200,460 Q300,460 330,420 Q340,300 320,180 Z"
        fill="url(#hairGrad)" />

  <!-- 脖子 -->
  <rect x="175" y="300" width="50" height="70" fill="url(#skinGrad)" rx="15" />

  <!-- 衣服 -->
  <path d="M130,360 Q200,340 270,360 L290,500 L110,500 Z" fill="url(#dressGrad)" opacity="0.9" />
  <path d="M160,360 Q200,400 240,360" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" />

  <!-- 脸型 -->
  <path d="M130,200 Q120,280 150,330 Q200,360 250,330 Q280,280 270,200 Q270,130 200,130 Q130,130 130,200 Z"
        fill="url(#skinGrad)" />

  <!-- 腮红 -->
  <ellipse cx="155" cy="265" rx="22" ry="14" fill="#ffb6c1" opacity="0.35" />
  <ellipse cx="245" cy="265" rx="22" ry="14" fill="#ffb6c1" opacity="0.35" />

  <!-- 眼睛 -->
  <g id="eyes">
    <ellipse class="eye-left" cx="165" cy="225" rx="22" ry="28" fill="#fff" />
    <ellipse class="pupil-left" cx="168" cy="225" rx="14" ry="20" fill="url(#eyeGrad)" />
    <circle cx="172" cy="218" r="6" fill="#fff" opacity="0.9" />
    <path d="M140,205 Q165,190 190,205" fill="none" stroke="#4a3b52" stroke-width="3" stroke-linecap="round" />

    <ellipse class="eye-right" cx="235" cy="225" rx="22" ry="28" fill="#fff" />
    <ellipse class="pupil-right" cx="238" cy="225" rx="14" ry="20" fill="url(#eyeGrad)" />
    <circle cx="242" cy="218" r="6" fill="#fff" opacity="0.9" />
    <path d="M210,205 Q235,190 260,205" fill="none" stroke="#4a3b52" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- 鼻子 -->
  <path d="M200,255 L196,270 L204,270 Z" fill="#e6b8a2" opacity="0.6" />

  <!-- 嘴巴 -->
  <path id="mouth" d="M180,295 Q200,310 220,295" fill="none" stroke="#d68c8c" stroke-width="3" stroke-linecap="round" />

  <!-- 前发 -->
  <path d="M120,180 Q150,100 200,100 Q250,100 280,180 Q260,140 200,140 Q140,140 120,180 Z"
        fill="url(#hairGrad)" />
  <path d="M120,180 Q100,250 110,360 L130,360 Q125,260 135,190 Z" fill="url(#hairGrad)" />
  <path d="M280,180 Q300,250 290,360 L270,360 Q275,260 265,190 Z" fill="url(#hairGrad)" />

  <!-- 发饰/光点 -->
  <circle cx="160" cy="145" r="4" fill="#fff" opacity="0.7" />
  <circle cx="240" cy="150" r="3" fill="#fff" opacity="0.6" />
  <circle cx="200" cy="120" r="5" fill="#fff" opacity="0.5" />
</svg>
